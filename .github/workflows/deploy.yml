name: Deploy Website Masjid

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Izin untuk deploy ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya satu deployment aktif sekaligus
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Diperlukan untuk lastUpdated VitePress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependensi
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
